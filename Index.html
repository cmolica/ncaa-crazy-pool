<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 2026 NCAA Pool Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');

- { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060910; font-family: ‘Inter’, -apple-system, sans-serif; color: #fff; padding: 18px 10px 40px; }

.header { text-align: center; margin-bottom: 16px; }
.eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 4px; color: #f97316; text-transform: uppercase; margin-bottom: 4px; }
.title { font-family: ‘Bebas Neue’, sans-serif; font-size: 36px; letter-spacing: 4px; line-height: 1; }
.subtitle { font-size: 10px; color: #475569; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

.toolbar { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
#refresh-btn { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.4); color: #fb923c;
padding: 7px 18px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer;
letter-spacing: 1px; display: flex; align-items: center; gap: 5px; font-family: inherit; }
#refresh-btn:hover { background: rgba(249,115,22,0.25); }
#refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#status-text { font-size: 11px; color: #475569; }

.legend { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.legend span { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 99px; letter-spacing: 0.5px; }

.regions { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 1300px; margin: 0 auto; }
@media (min-width: 700px) { .regions { grid-template-columns: 1fr 1fr; } }

.region { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; overflow: hidden; }
.region-hdr { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.region-hdr .name { font-family: ‘Bebas Neue’, sans-serif; font-size: 18px; letter-spacing: 3px; }
.region-hdr .sub { font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
.east-hdr   { background: linear-gradient(90deg,#1e3a5f,#0f172a); border-bottom: 2px solid #3b82f6; color: #93c5fd; }
.west-hdr   { background: linear-gradient(90deg,#1a3328,#0f172a); border-bottom: 2px solid #22c55e; color: #86efac; }
.south-hdr  { background: linear-gradient(90deg,#3d1515,#0f172a); border-bottom: 2px solid #ef4444; color: #fca5a5; }
.midwest-hdr{ background: linear-gradient(90deg,#2d1a00,#0f172a); border-bottom: 2px solid #f97316; color: #fdba74; }

.bracket-group { display: flex; align-items: stretch; padding: 6px 8px;
border-bottom: 1px solid rgba(255,255,255,0.04); gap: 0; }
.bracket-group:last-child { border-bottom: none; }

.r1-stack { flex: 1.3; display: flex; flex-direction: column; gap: 5px; min-width: 0; }

.connector { width: 13px; flex-shrink: 0; display: flex; flex-direction: column; align-self: stretch; }
.c-top { flex: 1; border-right: 2px solid rgba(255,255,255,0.2); border-bottom: 2px solid rgba(255,255,255,0.2); border-bottom-right-radius: 2px; }
.c-bot { flex: 1; border-right: 2px solid rgba(255,255,255,0.2); }

.r2-wrap { flex: 1; display: flex; align-items: center; padding-left: 5px; min-width: 0; }

.matchup { border: 2px solid rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; width: 100%; }
.matchup.r2 { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }
.matchup.tbd { border: 2px dashed rgba(255,255,255,0.1); background: rgba(255,255,255,0.01); }

.tbd-inner { padding: 14px 10px; text-align: center; color: #334155; font-size: 10px; font-weight: 600; line-height: 1.6; }

.r2-meta { padding: 3px 10px 0; }
.r2-label { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #475569; }
.r2-time  { font-size: 8px; color: #64748b; padding-bottom: 2px; }

.team-slot { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.team-slot:last-child { border-bottom: none; }
.team-slot.winner  { background: rgba(74,222,128,0.05); }
.team-slot.loser   { background: rgba(0,0,0,0.2); opacity: 0.5; }
.team-slot.upcoming { background: rgba(255,255,255,0.02); }
.team-slot.live    { background: rgba(239,68,68,0.07); }

.seed-row { display: flex; align-items: baseline; gap: 4px; margin-bottom: 2px; }
.seed-num { font-size: 8px; font-weight: 700; color: #64748b; background: rgba(255,255,255,0.07); padding: 1px 3px; border-radius: 3px; }
.team-name { font-size: 11px; font-weight: 700; color: #f1f5f9; }

.owner-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; flex-wrap: wrap; }
.owner { font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 99px; }
.spread { font-size: 8px; font-weight: 600; color: #94a3b8; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px; }

.score-row { font-family: ‘Bebas Neue’, sans-serif; font-size: 13px; letter-spacing: 1px; color: #fff; }
.ftag { font-family: ‘Inter’, sans-serif; font-size: 7px; color: #475569; font-weight: 600; margin-left: 3px; }
.xfer-note { font-size: 7px; color: #fb923c; margin-top: 1px; }
.game-time { font-size: 8px; color: #475569; margin-top: 1px; }
.live-score { color: #f87171; }
.live-clock { font-size: 8px; color: #ef4444; margin-left: 4px; font-family: ‘Inter’, sans-serif; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #ef4444;
animation: pulse 1.2s ease-in-out infinite; margin-right: 3px; vertical-align: middle; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.spinning { display: inline-block; animation: spin 1s linear infinite; }

.timestamp { text-align: center; margin-top: 20px; font-size: 10px; color: #1e293b; letter-spacing: 1px; text-transform: uppercase; }
</style>

</head>

function playerStyle(name) {
  const key = name.toLowerCase().replace(/\s+/g,'').replace('matts','matt').replace('legrand','legrand');
  return PLAYERS[key] || PLAYERS[key.replace('s','')] || { bg:"rgba(100,100,100,0.2)", color:"#aaa", border:"rgba(100,100,100,0.3)" };
}

function ownerPill(name, extra='') {
  const s = playerStyle(name);
  return `<span class="owner" style="background:${s.bg};color:${s.color};border:1px solid ${s.border}">${name}${extra ? ' '+extra : ''}</span>`;
}

// ─────────────────────────────────────────────
// TEAM SLOT RENDERER
// ─────────────────────────────────────────────
function teamSlot(t) {
  const statusClass = t.status || 'upcoming';
  let scoreHtml = '';
  if (t.liveScore != null) {
    scoreHtml = `<div class="score-row live-score"><span class="live-dot"></span>${t.liveScore}–${t.liveOppScore}<span class="live-clock">${t.liveClock || ''}</span></div>`;
  } else if (t.score != null) {
    scoreHtml = `<div class="score-row">${t.score}<span class="ftag">${t.tag||''}</span></div>`;
  } else if (t.gameTime) {
    scoreHtml = `<div class="game-time">${t.gameTime}</div>`;
  }
  return `
    <div class="team-slot ${statusClass}" data-abbrs="${(t.abbrs||[]).join(',')}">
      <div class="seed-row"><span class="seed-num">${t.seed}</span><span class="team-name">${t.name}</span></div>
      <div class="owner-row">${ownerPill(t.owner, t.ownerExtra||'')}${t.spread ? `<span class="spread">${t.spread}</span>` : ''}</div>
      ${scoreHtml}
      ${t.xferNote ? `<div class="xfer-note">${t.xferNote}</div>` : ''}
    </div>`;
}

// ─────────────────────────────────────────────
// MATCHUP RENDERER
// ─────────────────────────────────────────────
function matchupHtml(teams, opts={}) {
  if (opts.tbd) return `<div class="matchup tbd"><div class="tbd-inner">⏳ Pending<br>upcoming games</div></div>`;
  const r2Meta = opts.isR2 ? `<div class="r2-meta"><div class="r2-label">ROUND 2</div><div class="r2-time">${opts.r2Time||''}</div></div>` : '';
  return `<div class="matchup${opts.isR2?' r2':''}">${r2Meta}${teams.map(teamSlot).join('')}</div>`;
}

// ─────────────────────────────────────────────
// BRACKET GROUP RENDERER
// ─────────────────────────────────────────────
function bracketGroup(g) {
  const r2Html = g.r2tbd
    ? matchupHtml([], {tbd:true})
    : matchupHtml(g.r2||[], {isR2:true, r2Time:g.r2Time});
  return `
    <div class="bracket-group">
      <div class="r1-stack">
        ${matchupHtml(g.r1top)}
        ${matchupHtml(g.r1bot)}
      </div>
      <div class="connector"><div class="c-top"></div><div class="c-bot"></div></div>
      <div class="r2-wrap">${r2Html}</div>
    </div>`;
}

// ─────────────────────────────────────────────

  ).join('');

// ─────────────────────────────────────────────
// LIVE SCORE OVERLAY
// Fetches ESPN API and overlays live/final scores
// on any team slot that has matching abbrs.
// Does NOT overwrite hardcoded final results.
// ─────────────────────────────────────────────
let refreshInterval;
const REFRESH_SECONDS = 60;
let countdown = REFRESH_SECONDS;

async function fetchScores() {
  const btn = document.getElementById('refresh-btn');
  const statusEl = document.getElementById('status-text');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">↻</span> Updating…';
  try {
    const res = await fetch(
      'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?limit=100'
    );
    if (!res.ok) throw new Error(`ESPN ${res.status}`);
    const data = await res.json();
    const events = data.events || [];

    // Build abbr → game lookup
    const gameMap = {};
    for (const ev of events) {
      const comp = ev.competitions?.[0];
      if (!comp) continue;
      const statusName = comp.status?.type?.name || '';
      const clock = comp.status?.displayClock || '';
      const period = comp.status?.period || '';
      for (const team of (comp.competitors || [])) {
        const abbr = team.team?.abbreviation?.toUpperCase();
        if (abbr) gameMap[abbr] = { statusName, clock, period,
          score: parseInt(team.score, 10) || 0,
          opponentScore: (comp.competitors||[]).find(t => t.team?.abbreviation?.toUpperCase() !== abbr)
            ? parseInt((comp.competitors||[]).find(t => t.team?.abbreviation?.toUpperCase() !== abbr).score, 10) || 0
            : 0
        };
      }
    }

    // Overlay live scores on team slots that still have abbrs and aren't hardcoded final
    const slots = document.querySelectorAll('.team-slot[data-abbrs]');
    for (const slot of slots) {
      const abbrs = slot.dataset.abbrs.split(',').filter(Boolean);
      for (const abbr of abbrs) {
        const g = gameMap[abbr.toUpperCase()];
        if (!g) continue;
        if (g.statusName === 'STATUS_IN_PROGRESS') {
          slot.classList.add('live');
          const scoreDiv = slot.querySelector('.score-row') || slot.querySelector('.game-time');
          if (scoreDiv) {
            scoreDiv.outerHTML = `<div class="score-row live-score"><span class="live-dot"></span>${g.score}–${g.opponentScore}<span class="live-clock"> ${g.clock} P${g.period}</span></div>`;
          }
        } else if (g.statusName === 'STATUS_FINAL' && slot.classList.contains('upcoming')) {
          const scoreDiv = slot.querySelector('.game-time');
          if (scoreDiv) {
            scoreDiv.outerHTML = `<div class="score-row">${g.score}<span class="ftag">FINAL</span></div>`;
          }
        }
        break;
      }
    }

    const now = new Date();
    statusEl.textContent = `Updated ${now.toLocaleTimeString()} · auto-refresh in ${REFRESH_SECONDS}s`;
    document.getElementById('timestamp').textContent = `Last Updated: ${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})} · ${now.toLocaleTimeString()}`;
    countdown = REFRESH_SECONDS;
  } catch(e) {
    statusEl.textContent = `⚠ Score fetch failed: ${e.message}`;
  }
  btn.disabled = false;
  btn.innerHTML = '↻ Refresh Scores';
}

// Countdown ticker
function startCountdown() {
  clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    countdown--;
    const statusEl = document.getElementById('status-text');
    if (countdown <= 0) {
      fetchScores();
    } else {
      const existing = statusEl.textContent;
      statusEl.textContent = existing.replace(/auto-refresh in \d+s/, `auto-refresh in ${countdown}s`);
    }
  }, 1000);
}

// Init
render();
fetchScores().then(startCountdown);
