<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 2026 NCAA Pool Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');

- { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060910; font-family: ‘Inter’, -apple-system, sans-serif; color: #fff; padding: 18px 10px 40px; }

.header { text-align: center; margin-bottom: 16px; }
.eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 4px; color: #f97316; text-transform: uppercase; margin-bottom: 4px; }
.title { font-family: ‘Bebas Neue’, sans-serif; font-size: 36px; letter-spacing: 4px; line-height: 1; }
.subtitle { font-size: 10px; color: #475569; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

.toolbar { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
#refresh-btn { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.4); color: #fb923c;
padding: 7px 18px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer;
letter-spacing: 1px; display: flex; align-items: center; gap: 5px; font-family: inherit; }
#refresh-btn:hover { background: rgba(249,115,22,0.25); }
#refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#status-text { font-size: 11px; color: #475569; }

.legend { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.legend span { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 99px; letter-spacing: 0.5px; }

/* ── Region grid ── */
.regions { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 1300px; margin: 0 auto; }
@media (min-width: 700px) { .regions { grid-template-columns: 1fr 1fr; } }

.region { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; overflow: hidden; }
.region-hdr { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.region-hdr .name { font-family: ‘Bebas Neue’, sans-serif; font-size: 18px; letter-spacing: 3px; }
.region-hdr .sub  { font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
.east-hdr    { background: linear-gradient(90deg,#1e3a5f,#0f172a); border-bottom: 2px solid #3b82f6; color: #93c5fd; }
.west-hdr    { background: linear-gradient(90deg,#1a3328,#0f172a); border-bottom: 2px solid #22c55e; color: #86efac; }
.south-hdr   { background: linear-gradient(90deg,#3d1515,#0f172a); border-bottom: 2px solid #ef4444; color: #fca5a5; }
.midwest-hdr { background: linear-gradient(90deg,#2d1a00,#0f172a); border-bottom: 2px solid #f97316; color: #fdba74; }

/* ── Bracket layout ── */
.bracket-body { display: flex; align-items: flex-start; overflow-x: auto; padding: 6px 6px 10px; }
.bracket-body::-webkit-scrollbar { height: 4px; }
.bracket-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.round-label-bar { height: 20px; font-size: 7px; font-weight: 800; letter-spacing: 2px;
color: #334155; text-align: center; text-transform: uppercase; line-height: 20px; }

/* ── Matchup cards ── */
.matchup { border: 2px solid rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; width: 100%; }
.matchup.adv  { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }
.matchup.tbd  { border: 2px dashed rgba(255,255,255,0.08); background: transparent; }
.tbd-inner { padding: 12px 6px; text-align: center; color: #1e293b; font-size: 9px; font-weight: 700; line-height: 1.6; }
.r2-meta { padding: 3px 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.r2-label { font-size: 7px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #475569; }
.r2-time  { font-size: 7px; color: #64748b; padding-bottom: 2px; }

/* ── Team slots ── */
.team-slot { padding: 5px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
.team-slot:last-child { border-bottom: none; }
.team-slot.winner   { background: rgba(74,222,128,0.05); }
.team-slot.loser    { background: rgba(0,0,0,0.2); opacity: 0.55; }
.team-slot.upcoming { background: rgba(255,255,255,0.02); }
.team-slot.live     { background: rgba(239,68,68,0.07); }

.seed-row { display: flex; align-items: baseline; gap: 3px; margin-bottom: 1px; }
.seed-num { font-size: 7px; font-weight: 700; color: #64748b; background: rgba(255,255,255,0.07);
padding: 1px 3px; border-radius: 3px; flex-shrink: 0; }
.team-name { font-size: 10px; font-weight: 700; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.owner-row { display: flex; align-items: center; gap: 3px; margin-bottom: 1px; overflow: hidden; flex-wrap: nowrap; }
.owner  { font-size: 7px; font-weight: 700; padding: 1px 5px; border-radius: 99px; white-space: nowrap; }
.spread { font-size: 7px; font-weight: 600; color: #94a3b8; background: rgba(255,255,255,0.06);
padding: 1px 4px; border-radius: 4px; white-space: nowrap; }

.score-row { font-family: ‘Bebas Neue’, sans-serif; font-size: 12px; letter-spacing: 1px; white-space: nowrap; }
.ftag { font-family: ‘Inter’, sans-serif; font-size: 7px; color: #475569; font-weight: 600; margin-left: 3px; }
.game-time { font-size: 7px; color: #475569; }
.live-score { color: #f87171; }
.live-clock { font-size: 7px; color: #ef4444; margin-left: 3px; font-family: ‘Inter’, sans-serif; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.live-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #ef4444;
animation: pulse 1.2s ease-in-out infinite; margin-right: 2px; vertical-align: middle; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.spinning { display: inline-block; animation: spin 1s linear infinite; }

/* ── Final Four ── */
.ff-section { max-width: 1300px; margin: 20px auto 0; }
.ff-title { text-align: center; font-family: ‘Bebas Neue’, sans-serif; font-size: 22px;
letter-spacing: 4px; color: #fbbf24; margin-bottom: 10px; }
.ff-bracket { display: flex; justify-content: center; overflow-x: auto; padding: 0 10px 10px; }

.timestamp { text-align: center; margin-top: 20px; font-size: 10px; color: #1e293b;
letter-spacing: 1px; text-transform: uppercase; }
</style>

</head>

const FF_TIMES = {

// ─────────────────────────────────────────────────────────────
// AUTO-ADVANCEMENT
// Looks up the winner of a matchup from RESULTS, then builds
// the next round's matchup array automatically.
// You never need to type team keys into future-round arrays.
// ─────────────────────────────────────────────────────────────

function getWinner(matchup, resKey) {
  if (!matchup) return null;
  for (const key of matchup.teams) {
    if (key && RESULTS[resKey]?.[key]?.status === 'winner') return key;
  }
  return null;
}

// Build a round's matchup array from the previous round's results.
// Each consecutive pair of prevMatchups produces one next-round slot.
// teams may be null (TBD) if that R1/R2 game isn't complete yet.
function buildRound(prevMatchups, prevResKey, times = []) {
  const out = [];
  for (let i = 0; i < prevMatchups.length; i += 2) {
    const w0   = getWinner(prevMatchups[i],   prevResKey);
    const w1   = getWinner(prevMatchups[i+1], prevResKey);
    const time = times[i / 2] || '';
    out.push({ teams: [w0, w1], time });
  }
  return out;
}

// Show a round only if at least one team is known or a time is set.
function roundHasData(matchups) {
  return matchups.some(m => m && (m.teams[0] || m.teams[1] || m.time));
}

// ─────────────────────────────────────────────────────────────
// RENDERERS
// ─────────────────────────────────────────────────────────────

// resKey: which RESULTS bucket to look up ('r1','r2','r3','r4','ff','ch')
function teamSlotHtml(key, resKey, showSpread, gameTime) {
  const team = T[key];
  if (!team) {
    return `<div class="team-slot upcoming" style="min-height:${BASE_H}px;">
      <div class="seed-row"><span class="team-name" style="color:#334155">TBD</span></div></div>`;
  }
  const res    = RESULTS[resKey]?.[key];
  const status = res?.status || 'upcoming';
  const spread = showSpread ? (team.r1Spread || '') : '';

  let body = '';
  if (res?.score != null) {
    body = `<div class="score-row">${res.score}<span class="ftag">${res.tag||''}</span></div>`;
  } else if (status === 'upcoming' && gameTime) {
    body = `<div class="game-time">${gameTime}</div>`;
  }

  return `
    <div class="team-slot ${status}" data-abbrs="${team.abbrs.join(',')}" style="min-height:${BASE_H}px;">
      <div class="seed-row"><span class="seed-num">${team.seed}</span><span class="team-name">${team.name}</span></div>
      <div class="owner-row">${ownerPill(team.owner, team.ownerExtra||'')}${spread ? `<span class="spread">${spread}</span>` : ''}</div>
      ${body}
    </div>`;
}

function matchupCardHtml(matchup, roundIdx, resKey) {
  if (!matchup || (!matchup.teams[0] && !matchup.teams[1])) {
    return `<div class="matchup tbd" style="width:100%;"><div class="tbd-inner">⏳ TBD<br>pending</div></div>`;
  }
  const { teams, time } = matchup;
  const isAdv = roundIdx > 0;
  const labels = ['','ROUND 2','SWEET 16','ELITE 8','FINAL FOUR','CHAMPIONSHIP'];

  // Look up game time from ESPN fetch if not hardcoded
  let displayTime = time || '';
  if (!displayTime && teams[0] && teams[1]) {
    const abbrs0 = T[teams[0]]?.abbrs || [];
    const abbrs1 = T[teams[1]]?.abbrs || [];
    for (const a of abbrs0) {
      for (const b of abbrs1) {
        const key = [a,b].sort().join('|');
        if (GAME_TIMES[key]) { displayTime = GAME_TIMES[key]; break; }
      }
      if (displayTime) break;
    }
  }

  const meta = isAdv
    ? `<div class="r2-meta"><div class="r2-label">${labels[roundIdx]||''}</div><div class="r2-time">${displayTime}</div></div>`
    : '';
  const showSpread = roundIdx === 0;
  const slotTime = (!isAdv && !RESULTS[resKey]?.[teams[0]]) ? (displayTime) : '';

  return `
    <div class="matchup${isAdv?' adv':''}" style="width:100%;">
      ${meta}
      ${teamSlotHtml(teams[0], resKey, showSpread, slotTime)}
      ${teamSlotHtml(teams[1], resKey, showSpread, '')}
    </div>`;
}

function roundColHtml(matchups, roundIdx, resKey, labelOverride) {
  const cH = containerH(roundIdx);
  const labels = ['ROUND 1','ROUND 2','SWEET 16','ELITE 8','FINAL FOUR','CHAMP'];
  const label  = labelOverride || labels[roundIdx] || `RD ${roundIdx+1}`;
  let html = `<div style="width:${COL_W}px;flex-shrink:0;">
    <div class="round-label-bar">${label}</div>`;
  for (const m of matchups) {
    html += `<div style="height:${cH}px;display:flex;align-items:center;padding:2px 0;">${matchupCardHtml(m, roundIdx, resKey)}</div>`;
  }
  return html + `</div>`;
}

function connectorColHtml(numConnectors, toRoundIdx) {
  const totalH = containerH(toRoundIdx);
  let html = `<div style="width:${CONN_W}px;flex-shrink:0;"><div style="height:${LABEL_H}px;"></div>`;
  for (let i = 0; i < numConnectors; i++) {
    html += `<div style="height:${totalH}px;display:flex;flex-direction:column;">
      <div style="flex:1;border-right:2px solid rgba(255,255,255,0.18);border-bottom:2px solid rgba(255,255,255,0.18);border-bottom-right-radius:2px;"></div>
      <div style="flex:1;border-right:2px solid rgba(255,255,255,0.18);"></div>
    </div>`;
  }
  return html + `</div>`;
}

// Get the Elite 8 winner for a given region index (fully derived from RESULTS)
function getRegionWinner(regionIdx) {
  const r = REGIONS[regionIdx];
  const r2 = buildRound(r.r1, 'r1', r.times.r2);
  const r3 = buildRound(r2,   'r2', r.times.r3);
  const r4 = buildRound(r3,   'r3', r.times.r4);
  return r4.length ? getWinner(r4[0], 'r4') : null;
}

function regionHtml(region) {
  const r1 = region.r1;
  const r2 = buildRound(r1, 'r1', region.times.r2);
  const r3 = buildRound(r2, 'r2', region.times.r3);
  const r4 = buildRound(r3, 'r3', region.times.r4);

  const rounds = [
    [r1, 'r1'],
    ...(roundHasData(r2) ? [[r2, 'r2']] : []),
    ...(roundHasData(r3) ? [[r3, 'r3']] : []),
    ...(roundHasData(r4) ? [[r4, 'r4']] : []),
  ];

  let body = '';
  for (let ri = 0; ri < rounds.length; ri++) {
    const [matchups, resKey] = rounds[ri];
    body += roundColHtml(matchups, ri, resKey);
    if (ri < rounds.length - 1) {
      body += connectorColHtml(rounds[ri+1][0].length, ri+1);
    }
  }

  return `
    <div class="region">
      <div class="region-hdr ${region.hdr}"><span class="name">${region.title}</span><span class="sub">${region.sub}</span></div>
      <div class="bracket-body">${body}</div>
    </div>`;
}

function renderFinalFour() {
  // East vs West, South vs Midwest — standard tournament seeding
  const ffMatchups = [
    { teams:[getRegionWinner(0), getRegionWinner(1)], time: FF_TIMES.ff[0]||'' },
    { teams:[getRegionWinner(2), getRegionWinner(3)], time: FF_TIMES.ff[1]||'' },
  ];
  const champMatchup = {
    teams:[getWinner(ffMatchups[0],'ff'), getWinner(ffMatchups[1],'ff')],
    time: FF_TIMES.champ||''
  };

  const hasFf    = ffMatchups.some(m => m.teams[0] || m.teams[1] || m.time);
  const hasChamp = champMatchup.teams[0] || champMatchup.teams[1] || champMatchup.time;
  if (!hasFf) return;

  document.getElementById('ff-section').style.display = 'block';
  let html = roundColHtml(ffMatchups, 0, 'ff', 'FINAL FOUR');
  if (hasChamp) {
    html += connectorColHtml(1, 1);
    html += roundColHtml([champMatchup], 1, 'ch', 'CHAMPIONSHIP');
  }
  document.getElementById('ff-bracket').innerHTML = html;
}

function render() {
  document.getElementById('bracket').innerHTML = REGIONS.map(regionHtml).join('');
  renderFinalFour();
}

// ─────────────────────────────────────────────────────────────
// GAME TIMES FROM ESPN
// Fetches scheduled start times for all upcoming tournament games.
// Stored as GAME_TIMES keyed by sorted abbr pair "A|B".
// matchupCardHtml uses this as fallback when no time is hardcoded.
// ─────────────────────────────────────────────────────────────
const GAME_TIMES = {};  // "ABBR1|ABBR2" → formatted time string

async function fetchGameTimes() {
  const dates = [
    '20260320','20260321','20260322','20260323','20260324',
    '20260327','20260328','20260329','20260330',
    '20260404','20260405','20260406','20260407',
  ];
  for (const date of dates) {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${date}&groups=50&limit=100`);
      if (!res.ok) continue;
      const data = await res.json();
      for (const ev of (data.events || [])) {
        const comp = ev.competitions?.[0];
        if (!comp) continue;
        const abbrs = (comp.competitors||[]).map(t => t.team?.abbreviation?.toUpperCase()).filter(Boolean);
        if (abbrs.length < 2) continue;
        const key = abbrs.slice().sort().join('|');
        if (GAME_TIMES[key]) continue; // already have it
        // Parse the date into a readable string
        const d = new Date(ev.date || comp.date);
        if (isNaN(d)) continue;
        const dayStr = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        const timeStr = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
        GAME_TIMES[key] = `${dayStr} · ${timeStr}`;
      }
    } catch(e) { /* silent */ }
  }
}
// Fetches ESPN odds for the full tournament window and injects
// spread pills into any R2+ team slot that doesn't have one yet.
// Runs on every refresh cycle so moving lines stay current.
// ─────────────────────────────────────────────────────────────
async function fetchSpreads() {
  // Cover the full tournament: R2 (Mar 21-22), S16 (Mar 27-28), E8 (Mar 29-30), FF/Champ (Apr 4-7)
  const dates = [
    '20260320','20260321','20260322','20260323','20260324',
    '20260327','20260328','20260329','20260330',
    '20260404','20260405','20260406','20260407',
  ];
  const spreadMap = {};

  for (const date of dates) {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${date}&groups=50&limit=100`);
      if (!res.ok) continue;
      const data = await res.json();
      for (const ev of (data.events || [])) {
        const comp = ev.competitions?.[0];
        const odds = comp?.odds?.[0];
        if (!odds || odds.spread == null) continue;
        const spread = Math.abs(parseFloat(odds.spread));
        if (isNaN(spread)) continue;
        const home = comp.competitors?.find(t => t.homeAway === 'home');
        const away = comp.competitors?.find(t => t.homeAway === 'away');
        if (!home || !away) continue;
        const ha = home.team?.abbreviation?.toUpperCase();
        const aa = away.team?.abbreviation?.toUpperCase();
        const homeFav = odds.homeTeamOdds?.favorite === true;
        if (ha) spreadMap[ha] = homeFav ? `−${spread}` : `+${spread}`;
        if (aa) spreadMap[aa] = homeFav ? `+${spread}` : `−${spread}`;
      }
    } catch(e) { /* silent fail per date */ }
  }

  // Inject into adv (R2+) slots and Final Four slots
  document.querySelectorAll('.matchup.adv .team-slot[data-abbrs]').forEach(slot => {
    const abbrs = slot.dataset.abbrs.split(',').filter(Boolean);
    for (const abbr of abbrs) {
      const sp = spreadMap[abbr.toUpperCase()];
      if (sp) {
        const row = slot.querySelector('.owner-row');
        if (row && !row.querySelector('.spread')) {
          row.insertAdjacentHTML('beforeend', `<span class="spread">${sp}</span>`);
        }
        break;
      }
    }
  });
}

// ─────────────────────────────────────────────────────────────
// LIVE SCORE OVERLAY
// Fetches ESPN's live scoreboard and overlays scores on
// team slots by matching abbreviations. Hardcoded final
// results in RESULTS are never overwritten (they use winner/loser
// status classes, not the 'upcoming' class the overlay checks).
// ─────────────────────────────────────────────────────────────
let refreshInterval;
const REFRESH_SECONDS = 60;
let countdown = REFRESH_SECONDS;

async function fetchScores() {
  const btn = document.getElementById('refresh-btn');
  const statusEl = document.getElementById('status-text');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">↻</span> Updating…';

  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?limit=100');
    if (!res.ok) throw new Error(`ESPN ${res.status}`);
    const data = await res.json();

    const gameMap = {};
    for (const ev of (data.events || [])) {
      const comp = ev.competitions?.[0];
      if (!comp) continue;
      const statusName = comp.status?.type?.name || '';
      const clock = comp.status?.displayClock || '';
      const period = comp.status?.period || '';
      for (const team of (comp.competitors || [])) {
        const abbr = team.team?.abbreviation?.toUpperCase();
        if (!abbr) continue;
        const opp = comp.competitors.find(t => t.team?.abbreviation?.toUpperCase() !== abbr);
        gameMap[abbr] = {
          statusName, clock, period,
          score:    parseInt(team.score, 10) || 0,
          oppScore: opp ? parseInt(opp.score, 10) || 0 : 0,
        };
      }
    }

    document.querySelectorAll('.team-slot[data-abbrs]').forEach(slot => {
      const abbrs = slot.dataset.abbrs.split(',').filter(Boolean);
      for (const abbr of abbrs) {
        const g = gameMap[abbr.toUpperCase()];
        if (!g) continue;
        if (g.statusName === 'STATUS_IN_PROGRESS') {
          slot.classList.add('live');
          const el = slot.querySelector('.score-row, .game-time');
          if (el) el.outerHTML = `<div class="score-row live-score"><span class="live-dot"></span>${g.score}–${g.oppScore}<span class="live-clock"> ${g.clock} P${g.period}</span></div>`;
        } else if (g.statusName === 'STATUS_FINAL' && slot.classList.contains('upcoming')) {
          const el = slot.querySelector('.game-time');
          if (el) el.outerHTML = `<div class="score-row">${g.score}<span class="ftag">FINAL</span></div>`;
        }
        break;
      }
    });

    await fetchSpreads();
    await fetchGameTimes();
    render(); // re-render with updated game times

    const now = new Date();
    statusEl.textContent = `Updated ${now.toLocaleTimeString()} · auto-refresh in ${REFRESH_SECONDS}s`;
    document.getElementById('timestamp').textContent =
      `Last Updated: ${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})} · ${now.toLocaleTimeString()}`;
    countdown = REFRESH_SECONDS;
  } catch(e) {
    statusEl.textContent = `⚠ Score fetch failed: ${e.message}`;
  }

  btn.disabled = false;
  btn.innerHTML = '↻ Refresh Scores';
}

function startCountdown() {
  clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    countdown--;
    const el = document.getElementById('status-text');
    if (countdown <= 0) {
      fetchScores();
    } else {
      el.textContent = el.textContent.replace(/auto-refresh in \d+s/, `auto-refresh in ${countdown}s`);
    }
  }, 1000);
}

// ── Init ──────────────────────────────────────────────────────
render();
fetchScores().then(startCountdown);
</script>
